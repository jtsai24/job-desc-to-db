<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <title>Job Capture</title>

  <body>
    <h1>Notion connection</h1>
    <label for="notion-token">Notion token</label>

      type="password"
      autocomplete="off"

    <script src="sidebar.js"></script>
